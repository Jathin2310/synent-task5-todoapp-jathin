<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DOABLE — Task Manager</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="noise"></div>

  <div class="app-wrapper">

    <header class="header">
      <div class="logo">TO-DO</div>
      <div class="tagline">get it done. no excuses.</div>
      <div class="stats">
        <span id="total-count">0</span> tasks &nbsp;/&nbsp;
        <span id="done-count">0</span> done
      </div>
    </header>

    <div class="input-area">
      <input
        type="text"
        id="task-input"
        placeholder="what needs to be done?"
        autocomplete="off"
        maxlength="80"
      />
      <button id="add-btn" onclick="addTask()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">ALL</button>
      <button class="filter-btn" data-filter="active">ACTIVE</button>
      <button class="filter-btn" data-filter="done">DONE</button>
    </div>

    <ul id="task-list"></ul>

    <div id="empty-state" class="empty-state">
      <div class="empty-icon">◎</div>
      <p>nothing here yet.<br/>add a task above.</p>
    </div>

    <footer class="footer">
      <button id="clear-done-btn" onclick="clearDone()">clear completed</button>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
